name: CI_CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "24"
jobs:
  testing-lint-nodejs:
    runs-on: ubuntu-latest

    steps:
      - name: checkout-code
        uses: actions/checkout@v4

      - name: node-setup
        uses: actions/setup-node@v4
        with:
          node-version: ${{env.NODE_VERSION}}
          cache: npm
          cache-dependency-directory: package-lock.json

      - name: install-packages
        run: npm ci

      - name: linting
        run: npm run lint

      - name: test
        run: npm run test

  docker-setup:
    needs: [testing-lint-nodejs]
    runs-on: ubuntu-latest

    steps:
      - name: checkout-code
        uses: actions/checkout@v4

      - name: docker-builx setup
        uses: docker/setup-buildx-action@v3

      - name: login-docker
        uses: docker/login-action@v3
        with:
          username: ${{secrets.USERNAME}}
          password: ${{secrets.PASSWORD}}

      - name: build-push-dockerhub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{secrets.USERNAME}}/my-app:latest

  deploy-to-server:
    needs: [testing-lint-nodejs, docker-setup]
    runs-on: ubuntu-latest

    steps:
      - name: ssh-to-server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{secrets.HOST}}
          username: ${{secrets.LOGIN_USAERNAME}}
          key: ${{secrets.KEY}}

          script: |
            docker stop my-app || true
            docker rm my-app || true
            docker run -d -p 80:3000 --name my-app kaiju20/my-app:latest
