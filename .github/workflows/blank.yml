name: CI_CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "24"
jobs:
  testing-lint-nodejs:
    runs-on: ubuntu-latest

    steps:
      - name: checkout-code
        uses: actions/checkout@v4

      - name: node-setup
        uses: actions/setup-node@v4
        with:
          node-version: ${{env.NODE_VERSION}}
          cache: npm
          cache-dependency-directory: package-lock.json

      - name: install-packages
        run: npm ci

      - name: linting
        run: npm run lint

      - name: test
        run: npm run test

  docker-setup:
    needs: [testing-lint-nodejs]
    runs-on: ubuntu-latest

    steps:
      - name: checkout-code
        uses: actions/checkout@v4

      - name: docker-builx setup
        uses: docker/setup-buildx-action@v3

      - name: login-docker
        uses: docker/login-action@v3
        with:
          username: ${{secrets.USERNAME}}
          password: ${{secrets.PASSWORD}}

      - name: build-push-dockerhub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{secrets.USERNAME}}/my-app:latest
